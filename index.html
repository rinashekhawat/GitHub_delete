<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Manager Utility</title>
    <style>
        /* Premium Mobile-First UI/UX */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            max-width: 650px; 
            margin: auto; 
            background: #f4f7f6; 
            color: #333;
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05); 
        }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 24px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border: 1.5px solid #e0e0e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #007bff; outline: none; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 15px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #a0c4ff; cursor: not-allowed; }
        
        .status-msg { margin-top: 15px; font-size: 14px; text-align: center; color: #555; }
        
        .repo-item { 
            display: flex; 
            flex-direction: column; 
            padding: 18px; 
            border: 1px solid #eaeaea; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            background: #fff; 
            transition: box-shadow 0.2s;
        }
        .repo-item:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.04); }
        
        .repo-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .repo-title { font-size: 16px; font-weight: 700; color: #24292f; word-break: break-all; margin-right: 10px; }
        
        .badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
        .badge { font-size: 12px; padding: 4px 8px; border-radius: 6px; font-weight: 600; }
        .badge-private { color: #d93025; background: #fce8e6; }
        .badge-public { color: #188038; background: #e6f4ea; }
        .badge-size { color: #474a4d; background: #f1f3f4; }
        
        .action-buttons { display: flex; gap: 10px; width: 100%; }
        .btn-toggle { background: #fbbc04; color: #1a1a1a; width: 50%; padding: 10px; font-size: 13px; }
        .btn-delete { background: #dc3545; color: white; width: 50%; padding: 10px; font-size: 13px; }

        /* Responsive fixes for larger screens */
        @media (min-width: 480px) {
            .repo-item { flex-direction: row; justify-content: space-between; align-items: center; }
            .repo-header { margin-bottom: 0; flex-direction: column; }
            .action-buttons { width: auto; flex-shrink: 0; }
            .btn-toggle, .btn-delete { width: auto; padding: 10px 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>GitHub Repo Manager</h2>
        <p style="font-size: 13px; color: #666; margin-top: -10px; margin-bottom: 20px;">
            Requires a Classic Token with <strong>repo</strong> and <strong>delete_repo</strong> scopes.
        </p>
        
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxx...">
        <button id="fetchBtn">Fetch Repositories</button>
        <div id="statusMessage" class="status-msg"></div>
        
        <div id="repoList" style="margin-top: 25px;"></div>
    </div>

    <script>
        // KB to MB/GB Formatter
        function formatSize(kb) {
            if (kb === 0) return '0 KB';
            if (kb < 1024) return kb + ' KB';
            const mb = kb / 1024;
            if (mb < 1024) return mb.toFixed(2) + ' MB';
            const gb = mb / 1024;
            return gb.toFixed(2) + ' GB';
        }

        // Fetch Logic
        document.addEventListener('DOMContentLoaded', () => {
            const fetchBtn = document.getElementById('fetchBtn');
            const tokenInput = document.getElementById('tokenInput');
            const repoListDiv = document.getElementById('repoList');
            const statusMessage = document.getElementById('statusMessage');

            fetchBtn.addEventListener('click', async () => {
                const token = tokenInput.value.trim();
                
                if (!token) {
                    statusMessage.innerHTML = "<span style='color: #dc3545;'>Please enter your GitHub Classic Token.</span>";
                    return;
                }

                statusMessage.innerHTML = "Loading repos...";
                fetchBtn.disabled = true;
                fetchBtn.innerText = "Fetching...";
                repoListDiv.innerHTML = "";

                try {
                    const response = await fetch('https://api.github.com/user/repos?per_page=100&affiliation=owner', {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (!response.ok) {
                        if(response.status === 401) throw new Error("Invalid Token! Please check your token.");
                        throw new Error("GitHub API Error: " + response.status);
                    }

                    const repos = await response.json();
                    
                    if(repos.length === 0) {
                        statusMessage.innerHTML = "No repositories found for this token.";
                        fetchBtn.disabled = false;
                        fetchBtn.innerText = "Fetch Repositories";
                        return;
                    }

                    statusMessage.innerHTML = `Total Repositories: <strong>${repos.length}</strong>`;

                    repos.forEach(repo => {
                        const repoDiv = document.createElement('div');
                        repoDiv.className = 'repo-item';
                        
                        const badgeId = `badge-${repo.name}`;
                        const isPrivateClass = repo.private ? 'badge-private' : 'badge-public';
                        const isPrivateText = repo.private ? 'Private' : 'Public';

                        repoDiv.innerHTML = `
                            <div class="repo-header">
                                <div>
                                    <div class="repo-title">${repo.name}</div>
                                    <div class="badges">
                                        <span id="${badgeId}" class="badge ${isPrivateClass}">
                                            ${isPrivateText}
                                        </span>
                                        <span class="badge badge-size">
                                            💾 ${formatSize(repo.size)}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="action-buttons">
                                <button class="btn-toggle" onclick="toggleVisibility('${repo.owner.login}', '${repo.name}', ${repo.private}, this, '${badgeId}')">
                                    Toggle Vis
                                </button>
                                <button class="btn-delete" onclick="deleteRepo('${repo.owner.login}', '${repo.name}', this)">
                                    Delete
                                </button>
                            </div>
                        `;
                        repoListDiv.appendChild(repoDiv);
                    });

                } catch (error) {
                    statusMessage.innerHTML = `<span style="color: #dc3545;">Error: ${error.message}</span>`;
                } finally {
                    fetchBtn.disabled = false;
                    fetchBtn.innerText = "Fetch Repositories";
                }
            });
        });

        // Toggle Visibility Logic
        window.toggleVisibility = async function(owner, repoName, isCurrentlyPrivate, buttonElement, badgeId) {
            const token = document.getElementById('tokenInput').value.trim();
            const newVisibility = !isCurrentlyPrivate; 
            
            const confirmToggle = confirm(`Make '${repoName}' ${newVisibility ? 'PRIVATE' : 'PUBLIC'}?`);
            if (!confirmToggle) return;

            const originalText = buttonElement.innerText;
            buttonElement.innerText = "...";
            buttonElement.disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ private: newVisibility })
                });

                if (response.ok) {
                    const badgeElement = document.getElementById(badgeId);
                    if (newVisibility) {
                        badgeElement.innerText = "Private";
                        badgeElement.className = "badge badge-private";
                    } else {
                        badgeElement.innerText = "Public";
                        badgeElement.className = "badge badge-public";
                    }
                    
                    buttonElement.setAttribute('onclick', `toggleVisibility('${owner}', '${repoName}', ${newVisibility}, this, '${badgeId}')`);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || "Update failed. Is the 'repo' scope enabled?");
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            } finally {
                buttonElement.innerText = originalText;
                buttonElement.disabled = false;
            }
        };

        // Delete Repo Logic
        window.deleteRepo = async function(owner, repoName, buttonElement) {
            const token = document.getElementById('tokenInput').value.trim();
            
            const confirmDelete = confirm(`WARNING: '${repoName}' will be permanently deleted.\nAre you absolutely sure?`);
            if (!confirmDelete) return;

            const originalText = buttonElement.innerText;
            buttonElement.innerText = "...";
            buttonElement.disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.status === 204) {
                    buttonElement.closest('.repo-item').remove();
                    
                    const statusMessage = document.getElementById('statusMessage');
                    if (statusMessage && statusMessage.innerHTML.includes('Total Repositories')) {
                        const currentCount = document.getElementById('repoList').children.length;
                        statusMessage.innerHTML = `Total Repositories: <strong>${currentCount}</strong>`;
                    }
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || "Delete failed. Is the 'delete_repo' scope enabled?");
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
                buttonElement.innerText = originalText;
                buttonElement.disabled = false;
            }
        };
    </script>
</body>
</html>
